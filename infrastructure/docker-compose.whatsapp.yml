# Запуск с WhatsApp:
# cd infrastructure
# docker compose -f docker-compose.yml -f docker-compose.whatsapp.yml up -d
services:
  evolution:
    image: atendai/evolution-api:latest
    container_name: gelendzhik-evolution
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-https://wa.example.com}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:?Set EVOLUTION_API_KEY in .env}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgres://${POSTGRES_USER:-n8n_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-n8n_gelendzhik}
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - gelendzhik-net

volumes:
  evolution_data:
